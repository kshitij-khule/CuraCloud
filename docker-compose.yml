version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
    POSTGRES_USER: ${DB_USER}
    POSTGRES_PASSWORD: ${DB_PASSWORD}
    POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - curacloud_net
  
  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
    networks:
      - curacloud_net

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - curacloud_net

volumes:
  postgres_data:

networks:
  curacloud_net:
    driver: bridge


  
  